name: Documentation / Link Bug
description: Report broken links, typos, or doc errors
title: "[Docs] "
labels: ["documentation"]
body:
  - type: input
    id: location
    attributes:
      label: File or URL
      placeholder: README.md or https://...
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What is wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
