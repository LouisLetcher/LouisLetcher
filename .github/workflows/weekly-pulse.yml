name: Weekly Pulse

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate public changelog pulse
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: LouisLetcher
        run: python -m profile_ops.cli generate-pulse --output docs/CHANGELOG-PUBLIC.md

      - name: Commit pulse update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/CHANGELOG-PUBLIC.md
          if git diff --staged --quiet; then
            echo "No pulse changes"
          else
            git commit -m "chore: update weekly public pulse"
            git push
          fi
