name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate markdown links
        run: python -m profile_ops.cli check-links --root .

      - name: Run tests
        run: pytest tests/ -v --cov=profile_ops --cov-report=term-missing --cov-fail-under=80
