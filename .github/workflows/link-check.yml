name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # Local-link validation is deterministic and safe to gate merges on.
      # The full external sweep runs on a schedule (link-check-external.yml)
      # because public hosts (Medium, LinkedIn, private repos) bot-block or
      # 404 anonymous CI requests, producing false failures.
      - name: Validate local markdown links
        run: python -m profile_ops.cli check-links --root . --skip-external

      - name: Run tests
        run: pytest tests/ -v --cov=profile_ops --cov-report=term-missing --cov-fail-under=80
